  <section class="view" id="view-bosses">
    <div class="adder">
      <input id="bName" placeholder="Name the trial — e.g. Pass the certification exam" maxlength="80">
      <textarea id="bChecks" placeholder="Milestones (one per line) — each one is a step of health&#10;e.g. Submit application&#10;Pass the interview&#10;Receive orders" style="margin-top:9px;resize:vertical;min-height:70px"></textarea>
      <div class="row" style="margin-top:8px">
        <label style="font-size:12px;color:var(--ink-faint);display:flex;flex-direction:column;gap:4px;flex:1">Target date (optional)<input type="date" id="bDue" class="q-due-input"></label>
      </div>
      <button class="btn-add" id="bAdd">Set the Trial</button>
    </div>
    <div class="sec-h"><h2>Trials</h2><span class="hint">great tests — endured one step at a time</span></div>
    <ul class="list" id="bList"></ul>
  </section>
