  <section class="view" id="view-shop">

      <input id="rName" placeholder="Hard-won rest — e.g. 1 episode of my show" maxlength="60">
      <div class="row">
        <input id="rCost" type="number" min="1" max="9999" value="30" placeholder="Merit point cost">

    <div class="sec-h"><h2>The Mead Hall</h2><span class="hint">earned rest — claim it without guilt</span></div>
    <ul class="list" id="rList"></ul>
  </section>
