  <section class="view" id="view-quests">
    <div class="adder">
      <input id="qName" placeholder="Swear an oath — e.g. Finish history essay" maxlength="80">
      <div class="row">
        <select id="qDiff">
          <option value="easy">Routine · 15 XP · 5 pts</option>
          <option value="med" selected>Priority · 35 XP · 12 pts</option>
          <option value="hard">High-Risk · 70 XP · 28 pts</option>
        </select>
        <select id="qPath">
          <option value="tactical">⚔️ Path of War</option>
          <option value="physical">🌿 Path of the Body</option>
          <option value="cognitive">🌀 Path of the Mind</option>
          <option value="physiological">💧 Path of Vitality</option>
          <option value="technical">🔨 Path of the Craft</option>
          <option value="leadership">🏴 Path of Command</option>
          <option value="academic">📜 Path of Knowledge</option>
          <option value="personal">🪞 Path of the Self</option>
          <option value="hearth">🔥 Path of the Hearth</option>
          <option value="roots">🌳 Path of Roots</option>
        </select>
      </div>
      <div class="row" style="margin-top:8px;gap:10px">
        <label style="font-size:12px;color:var(--ink-faint);display:flex;flex-direction:column;gap:4px;flex:1">Due date (optional)<input type="date" id="qDue" class="q-due-input"></label>
        <label style="font-size:12px;color:var(--ink-faint);display:flex;flex-direction:column;gap:4px;width:90px">Steps (optional)<input type="number" id="qSteps" min="2" max="20" placeholder="e.g. 5" style="background:var(--panel-2);border:1px solid var(--line);color:var(--ink);padding:6px 8px;border-radius:6px;font-family:inherit;font-size:13px"></label>
      </div>
      <div style="margin-top:8px">
        <textarea id="qNotes" placeholder="Why this oath matters (optional)" rows="2" style="width:100%;background:var(--panel-2);border:1px solid var(--line);color:var(--ink);padding:7px 10px;border-radius:8px;font-family:inherit;font-size:12px;resize:vertical;box-sizing:border-box"></textarea>
      </div>
      <button class="btn-add" id="qAdd">Swear the Oath</button>
    </div>
    <div class="sec-h"><h2>Active Oaths</h2><span class="hint">sworn and unfinished — each one a debt</span></div>
    <ul class="list" id="qList"></ul>
    <div id="qArchive"></div>
  </section>
